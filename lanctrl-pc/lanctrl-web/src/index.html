<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <title>LanCtrl Web 控制台</title>
    <link rel="stylesheet" href="/web/assets/styles/app.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="hero-panel">
        <div>
          <p class="eyebrow">局域网控制台</p>
        </div>
        <div class="connection-card" aria-live="polite">
          <span id="connectionDot" class="status-dot"></span>
          <div>
            <strong id="connectionText">正在连接</strong>
            <span id="connectionDetail">等待 WebSocket 状态同步</span>
          </div>
        </div>
      </header>

      <main class="workspace">
        <nav class="section-nav" aria-label="控制台导航">
          <button class="nav-item active" type="button" data-tab="actions">操作</button>
          <button class="nav-item" type="button" data-tab="schedules">定时</button>
          <button class="nav-item" type="button" data-tab="history">历史</button>
        </nav>

        <section class="page active" data-page="actions">
          <div class="section-title">
            <button id="refreshStateButton" class="icon-button" type="button" aria-label="刷新状态">刷新</button>
          </div>
          <div id="actionGrid" class="action-grid"></div>
          <div id="volumePanel"></div>
        </section>

        <section class="page" data-page="schedules">
          <div class="section-title">
            <div>
              <h2>定时任务</h2>
              <p>创建、查看并停止尚未执行的任务。</p>
            </div>
          </div>
          <form id="taskForm" class="composer-panel">
            <label>
              <span>任务类型</span>
              <select id="taskFeature"></select>
            </label>
            <label id="taskVolumeField" class="hidden">
              <span>音量</span>
              <input id="taskVolume" type="number" min="0" max="100" step="1" value="50" />
            </label>
            <label>
              <span>多久后执行</span>
              <select id="taskDelay">
                <option value="1">1 分钟后</option>
                <option value="5" selected>5 分钟后</option>
                <option value="10">10 分钟后</option>
                <option value="30">30 分钟后</option>
                <option value="60">1 小时后</option>
              </select>
            </label>
            <button class="primary-button" type="submit">添加任务</button>
          </form>
          <div class="section-title compact">
            <div>
              <h3>待执行列表</h3>
              <p id="taskCountText">暂无任务</p>
            </div>
          </div>
          <div id="taskList" class="list-stack"></div>
        </section>

        <section class="page" data-page="history">
          <div class="section-title">
            <div>
              <h2>任务历史</h2>
              <p>执行、失败、取消和手动操作都会同步到这里。</p>
            </div>
          </div>
          <div id="historyList" class="list-stack"></div>
        </section>
      </main>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </div>

    <script type="module" src="/web/assets/main.js"></script>
  </body>
</html>
