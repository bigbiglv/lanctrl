name: Build PC Windows App

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'lanctrl-pc/**'
      - '.github/workflows/pc-build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pc:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Frontend Dependencies
        run: pnpm install
        working-directory: ./lanctrl-pc/lanctrl-ui

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v1.1.3

      - name: Build and Publish Tauri Release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: lanctrl-pc/lanctrl-ui
          tauriScript: pnpm tauri
          tagName: pc-v__VERSION__
          releaseName: LanCtrl PC v__VERSION__
          releaseBody: PC 端自动更新发布。
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
