name: Build PC Windows App

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'lanctrl-pc/**'
      - '.github/workflows/pc-build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      pc: ${{ steps.filter.outputs.pc }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PC Changes
        id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pc=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          if echo "$changed_files" | grep -Eq '^(lanctrl-pc/|\.github/workflows/pc-build\.yml$)'; then
            echo "pc=true" >> "$GITHUB_OUTPUT"
          else
            echo "pc=false" >> "$GITHUB_OUTPUT"
          fi

  build-pc:
    needs: changes
    if: needs.changes.outputs.pc == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Frontend Dependencies
        run: pnpm install
        working-directory: ./lanctrl-pc/lanctrl-ui

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v1.1.3

      - name: Build and Publish Tauri Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: lanctrl-pc/lanctrl-ui
          tauriScript: pnpm tauri
          tagName: pc-v__VERSION__
          releaseName: LanCtrl PC v__VERSION__
          releaseBody: PC updater release
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
