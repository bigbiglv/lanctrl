name: Build iOS Unsigned IPA

on:
  # 当提交代码到 main 或 master 分支，且是移动端相关代码改动时自动触发
  push:
    branches: [ "main", "master" ]
    paths:
      - 'lanctrl-mobile/**'
      - '.github/workflows/ios-build.yml'
  # 允许在 GitHub 网页端手动点击按钮触发
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Install Dependencies
        run: flutter pub get
        working-directory: ./lanctrl-mobile

      # 禁用签名直接构建 release 代码
      - name: Build iOS App
        run: flutter build ios --release --no-codesign
        working-directory: ./lanctrl-mobile

      # 在 mac 虚拟机中，把 .app 封装成 .ipa 文件
      - name: Package to IPA
        run: |
          cd lanctrl-mobile/build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -qr lanctrl-ios-unsigned.ipa Payload
          
      # 上传结果，方便在网页上下载
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lanctrl-iOS-IPA
          path: lanctrl-mobile/build/ios/iphoneos/lanctrl-ios-unsigned.ipa
